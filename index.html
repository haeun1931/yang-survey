

<head>
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title> 오빠 전용 설문조사 </title>
    <style>

body{
    background-color:#FFE4EC;
    font-family:"고딕", sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
    margin:0;
}

.container{
    background:white;
    width:450px;

    padding:30px;

    border-radius:20px;

    box-shadow:0 0 20px rgba(0,0,0,0.15);

    text-align:center;
}

h1{
    color:#ff4f88;
}

input[type=text],
textarea,
select{

    width:90%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;

    border:2px solid #ffd1dc;
    border-radius:10px;
}

input[type=submit]{

    background:#ff8db5;
    color:white;

    border:none;

    padding:12px 25px;

    border-radius:30px;

    font-size:17px;

    cursor:pointer;
}

input[type=submit]:hover{

    background:#ff6ea1;
}

</style>
</head>

<body>

<div class="container"><h1> 오빠 전용 설문조사 </h1>


<form action="result.html">

이름 :
<input type="text" placeholder="양거노"><br><br>

Q1. 오빵이는 하은이를 좋아하나요?<br>
<input type="radio" name="love" value="yes"> 네!! <br>
<input type="radio" name="love" value="very"> 엄청 좋아해<br>
<input type="radio" name="love" value="crazy"> 세상에서 제일 좋아해<br><br>

Q2. 하은이의 가장 귀여운 점은?<br>

    <option>수영장</option>
    <option>속초</option>
    <option>강릉</option>
    <option>바다</option>
</select>

<br><br>

</div>
